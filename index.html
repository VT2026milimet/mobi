<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Phòng Thí Nghiệm Ảo - Responsive V60</title>
    
    <script src="data.js"></script>
    <script src="tools.js"></script>
    <script src="chemicals.js"></script>
    <script src="glassware.js"></script>
    <script src="reagents.js"></script>
    <script src="actions.js"></script>
    <script src="reactions.js"></script>
    
    <script src="https://code.responsivevoice.org/responsivevoice.js?key=mrZyBS2m"></script>

    <style>
        :root {
            --primary-blue: #005a82; 
            --gold-accent: #d4af37; 
            --white: #ffffff;
            --bg-light: #f0f7f9; 
            --safety-green: #2ecc71;
        }
        
        * { box-sizing: border-box; }
        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%;
            overflow: hidden; font-family: 'Segoe UI', Arial, sans-serif;
            background: #000; touch-action: none;
        }
        
        #stage { 
            width: 100vw; height: 100vh; 
            display: flex; justify-content: center; align-items: center; 
            background: radial-gradient(circle, #ffffff 0%, #e8f4f8 100%);
        }
        
        .screen { 
            position: absolute; 
            width: 95%; max-width: 1100px; 
            height: 90vh; max-height: 700px;
            background: var(--white); border-radius: 25px; 
            display: none; flex-direction: row; overflow: hidden; 
            box-shadow: 0 20px 60px rgba(0,0,0,0.2); 
        }
        .active { display: flex; }

        /* Responsive cho Mobile */
        @media (max-width: 768px) {
            .screen { flex-direction: column; height: 95vh; max-height: none; }
            .doctor-side { flex: 0.35 !important; border-right: none !important; border-bottom: 4px solid var(--gold-accent); }
            .content-side { flex: 0.65 !important; padding: 20px !important; }
            .page1-h1 { font-size: 1.4rem !important; }
            .doctor-name { font-size: 1.3rem !important; }
            .description { font-size: 0.9rem !important; }
        }

        /* --- MÀN HÌNH 1 & 2 --- */
        .doctor-side { flex: 1.1; background: var(--bg-light); display: flex; align-items: center; justify-content: center; border-right: 6px solid var(--gold-accent); position: relative; }
        .doctor-img { width: 100%; height: 100%; object-fit: cover; }
        .content-side { flex: 1.3; padding: 40px; display: flex; flex-direction: column; justify-content: center; overflow-y: auto; }
        .btn-main { background: var(--gold-accent); color: white; border: none; padding: 15px 30px; border-radius: 50px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        .select-box { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 12px; margin-bottom: 15px; background: #fff; }

        /* --- MÀN HÌNH 3 (FIX TRÀN) --- */
        #step3 { background: #222; position: relative; display: flex; align-items: center; justify-content: center; }
        .protection-layer {
            position: relative;
            width: 100%; height: 100%;
            background-image: url('phongthinghiem.jpg');
            background-size: contain; background-repeat: no-repeat; background-position: center;
        }
        .hotspot { position: absolute; cursor: pointer; z-index: 100; /* border: 1px dashed red; */ }
        /* Tọa độ hotspot dựa trên % của hình nền */
        #target-blouse { top: 20%; left: 35%; width: 30%; height: 60%; }
        #target-glasses { top: 15%; left: 42%; width: 15%; height: 10%; }
        #target-rules { top: 10%; right: 5%; width: 20%; height: 40%; }
        
        .check-mark { position: absolute; color: var(--safety-green); font-size: 3rem; font-weight: bold; display: none; text-shadow: 0 0 10px white; pointer-events: none; }

        /* --- MÀN HÌNH 4 --- */
        #step4 { background: #eee; }
        #s4-sidebar { width: 180px; background: var(--primary-blue); display: flex; flex-direction: column; padding: 10px; gap: 8px; }
        @media (max-width: 768px) {
            #s4-sidebar { width: 100%; height: 60px; flex-direction: row; overflow-x: auto; border-bottom: 3px solid var(--gold-accent); }
            .s4-cat-btn { white-space: nowrap; font-size: 0.65rem !important; }
        }
        .s4-cat-btn { background: #fff; border: none; padding: 8px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .s4-cat-btn.active-cat { background: var(--gold-accent); color: #fff; }
        #s4-main-area { flex: 1; display: flex; flex-direction: column; position: relative; }
        #s4-icon-grid { flex: 1; display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 10px; padding: 15px; overflow-y: auto; }
        .s4-unit { background: #fff; border-radius: 10px; padding: 10px; text-align: center; border: 1px solid #ddd; }
        .s4-img { width: 100%; height: 60px; object-fit: contain; }
        
        #s4-tray-container { height: 130px; background: #fff; border-top: 3px solid var(--gold-accent); padding: 10px; position: relative; }
        #s4-tray { display: flex; gap: 10px; overflow-x: auto; height: 100%; align-items: center; }
        .tray-item { width: 70px; height: 70px; border: 1px solid #ccc; flex-shrink: 0; }
        .btn-check { position: absolute; top: -20px; right: 20px; background: var(--safety-green); color: #fff; border: none; padding: 8px 20px; border-radius: 20px; font-weight: bold; cursor: pointer; z-index: 100; }

        /* --- MÀN HÌNH 5 --- */
        #step5 { background-image: url('phonglab_main.jpg'); background-size: cover; background-position: center; }
        #workbench-area { position: absolute; inset: 0; }
        .draggable-item { position: absolute; cursor: grab; touch-action: none; z-index: 500; }
        .real-tool-img { width: 110px; height: auto; filter: drop-shadow(0 5px 10px rgba(0,0,0,0.3)); }
        
        /* UI Elements */
        .doctor-avatar { position: absolute; top: 15px; right: 15px; width: 70px; height: 70px; border-radius: 50%; border: 3px solid var(--gold-accent); background: #fff; overflow: hidden; z-index: 1000; }
        .avatar-img { width: 100%; height: 100%; object-fit: cover; }
        .speaking { animation: bob 0.5s infinite; }
        @keyframes bob { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
        
        #equation-display { position: absolute; top: 15px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); color: #ffeb3b; padding: 10px 20px; border-radius: 10px; font-size: 1.2rem; display: none; z-index: 2000; width: 80%; text-align: center; }
        .btn-back-theory { position: absolute; bottom: 15px; left: 15px; z-index: 2000; background: #f44336; color: #fff; border: none; padding: 10px 20px; border-radius: 20px; font-weight: bold; }
        
        /* Overlay Nội quy */
        #rules-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 3000; display: none; align-items: center; justify-content: center; }
        .rules-box { position: relative; width: 90%; max-width: 500px; background: #fff; padding: 10px; border-radius: 15px; }
    </style>
</head>
<body>
    <div id="stage">
        <div id="step1" class="screen active">
            <div class="doctor-side"><img src="kien-sang.jpg" class="doctor-img"></div>
            <div class="content-side" style="text-align: center;">
                <h1 class="page1-h1">Chào mừng bạn đến với<br>phòng thí nghiệm ảo.</h1>
                <span class="doctor-name">Tôi là Tiến sĩ Kiến Sáng</span>
                <p class="description">Bạn đã sẵn sàng bước vào thế giới hóa học đầy sắc màu và những thí nghiệm bất ngờ chưa?</p>
                <button class="btn-main" onclick="handleStart()">Khám phá ngay</button>
            </div>
        </div>

        <div id="step2" class="screen">
            <div class="doctor-side"><img src="kien-sang2.jpg" class="doctor-img"></div>
            <div class="content-side">
                <h2 style="color: var(--primary-blue);">Chọn thí nghiệm</h2>
                <select class="select-box" id="grade-select" onchange="updateLessons()"></select>
                <select class="select-box" id="lesson-select" onchange="updateExperiments()" disabled></select>
                <select class="select-box" id="exp-select" disabled></select>
                <button class="btn-main" style="width: 100%; margin-top: 15px;" onclick="goToStep3()">VÀO PHÒNG THÍ NGHIỆM</button>
            </div>
        </div>

        <div id="step3" class="screen">
            <div class="protection-layer">
                <div id="dr-avatar-s3" class="doctor-avatar"><img src="avatar.jpg" class="avatar-img"></div>
                <div id="target-blouse" class="hotspot" onclick="checkItem('blouse')"></div>
                <div id="target-glasses" class="hotspot" onclick="checkItem('glasses')"></div>
                <div id="target-rules" class="hotspot" onclick="checkItem('rules')"></div>
                <div id="ok-blouse" class="check-mark" style="top:40%; left:45%;">✓</div>
                <div id="ok-glasses" class="check-mark" style="top:15%; left:48%;">✓</div>
                <div id="ok-rules" class="check-mark" style="top:20%; right:15%;">✓</div>
            </div>
            <div id="rules-overlay">
                <div class="rules-box">
                    <button style="position:absolute; top:-15px; right:-15px; width:40px; height:40px; border-radius:50%; background:red; color:#fff; border:none; font-weight:bold;" onclick="closeRules()">✕</button>
                    <img src="Noiquy.jpg" style="width:100%; height:auto; border-radius:10px;">
                </div>
            </div>
            <button class="btn-back-theory" onclick="backToStep2()">Quay lại</button>
        </div>

        <div id="step4" class="screen">
            <div id="s4-sidebar"></div>
            <div id="s4-main-area">
                <div id="dr-avatar-s4" class="doctor-avatar"><img src="avatar.jpg" class="avatar-img"></div>
                <div id="s4-icon-grid"></div>
                <div id="s4-tray-container">
                    <button class="btn-check" id="main-check-btn" onclick="validateCurrentMode()">XONG DỤNG CỤ</button>
                    <div id="s4-tray"></div>
                </div>
            </div>
            <button class="btn-back-theory" onclick="backToStep2()">Quay lại</button>
        </div>

        <div id="step5" class="screen">
            <div id="dr-avatar-s5" class="doctor-avatar"><img src="avatar.jpg" class="avatar-img"></div>
            <div id="workbench-area"></div>
            <div id="equation-display"></div>
            <button class="btn-back-theory" onclick="backToStep2()">Quay lại</button>
        </div>
    </div>

    <script>
        // Cấu trúc dữ liệu và logic điều khiển
        let experimentData = {}, groupedTools = {}, groupedChems = {};
        let currentExp = null, selectedItems = [], currentMode = "TOOLS", finalSelection = { tools: [], chems: [] };
        const iconPath = "icons/";
        let checks = { blouse: false, glasses: false, canCheckRules: false };

        function speak(text, callback, avatarId) {
            if (typeof responsiveVoice !== 'undefined') {
                const av = document.getElementById(avatarId);
                if (av) av.classList.add('speaking');
                responsiveVoice.speak(text, "Vietnamese Female", {
                    onend: () => { if (av) av.classList.remove('speaking'); if (callback) callback(); }
                });
            } else if (callback) callback();
        }

        function initApp() {
            if (typeof rawData !== 'undefined') {
                rawData.trim().split('\n').forEach(line => {
                    const [lop, bai, ten, dungcu, hoachat, pt, mota, effect] = line.split('|').map(s => s.trim());
                    const k = "Lớp " + lop;
                    if (!experimentData[k]) experimentData[k] = {};
                    if (!experimentData[k][bai]) experimentData[k][bai] = [];
                    experimentData[k][bai].push({ name: ten, tools: dungcu, chems: hoachat, eq: pt, description: mota, effect: effect });
                });
                initGrades();
            }
            // Load tools & chems tương tự code cũ...
            if (typeof toolCategoryData !== 'undefined') {
                toolCategoryData.trim().split('\n').forEach(line => {
                    const [nhom, ten, file] = line.split('|').map(s => s.trim());
                    if (!groupedTools[nhom]) groupedTools[nhom] = [];
                    groupedTools[nhom].push({ n: ten, f: file });
                });
            }
            if (typeof chemicalDataRaw !== 'undefined') {
                chemicalDataRaw.trim().split('\n').forEach(line => {
                    const [nhom, ten, file, congthuc] = line.split('|').map(s => s.trim());
                    if (!groupedChems[nhom]) groupedChems[nhom] = [];
                    groupedChems[nhom].push({ n: ten, f: file, formula: congthuc });
                });
            }
        }

        function handleStart() { showScreen('step2'); speak("Chào mừng bạn! Hãy chọn thí nghiệm nhé.", null, 'dr-avatar-s3'); }
        function initGrades() {
            const gs = document.getElementById('grade-select');
            gs.innerHTML = '<option value="">-- Lớp --</option>';
            Object.keys(experimentData).forEach(g => gs.innerHTML += `<option value="${g}">${g}</option>`);
        }
        function updateLessons() {
            const g = document.getElementById('grade-select').value;
            const ls = document.getElementById('lesson-select');
            ls.innerHTML = '<option value="">-- Bài --</option>';
            if (g) { ls.disabled = false; Object.keys(experimentData[g]).forEach(l => ls.innerHTML += `<option value="${l}">${l}</option>`); }
        }
        function updateExperiments() {
            const g = document.getElementById('grade-select').value;
            const l = document.getElementById('lesson-select').value;
            const es = document.getElementById('exp-select');
            es.innerHTML = '<option value="">-- Thí nghiệm --</option>';
            if (l) { es.disabled = false; experimentData[g][l].forEach(e => es.innerHTML += `<option value="${e.name}">${e.name}</option>`); }
        }

        function goToStep3() {
            const val = document.getElementById('exp-select').value;
            if (!val) return alert("Vui lòng chọn thí nghiệm!");
            currentExp = experimentData[document.getElementById('grade-select').value][document.getElementById('lesson-select').value].find(e => e.name === val);
            window.currentExp = currentExp;
            showScreen('step3');
            speak("Trước khi bắt đầu, hãy mặc đồ bảo hộ và đọc nội quy phòng thí nghiệm nhé.", null, 'dr-avatar-s3');
        }

        function checkItem(i) {
            if (i === 'blouse' || i === 'glasses') {
                if (checks[i]) return;
                checks[i] = true;
                document.getElementById('ok-' + i).style.display = 'block';
                speak(i === 'blouse' ? "Bạn đã mặc áo Blouse." : "Bạn đã đeo kính bảo hộ.", () => {
                    if (checks.blouse && checks.glasses) {
                        checks.canCheckRules = true;
                        speak("Tốt lắm, bây giờ hãy nhấn vào bảng nội quy trên tường nhé.");
                    }
                });
            } else if (i === 'rules' && checks.canCheckRules) {
                document.getElementById('rules-overlay').style.display = 'flex';
            } else if (i === 'rules') {
                speak("Bạn cần mặc áo và đeo kính trước đã.");
            }
        }

        function closeRules() {
            document.getElementById('rules-overlay').style.display = 'none';
            document.getElementById('ok-rules').style.display = 'block';
            showScreen('step4');
            setupSidebar("TOOLS");
            speak("Rất tốt! Bây giờ hãy chọn các dụng cụ và hóa chất cần thiết cho thí nghiệm này.", null, 'dr-avatar-s4');
        }

        function setupSidebar(mode) {
            currentMode = mode;
            const sb = document.getElementById('s4-sidebar');
            sb.innerHTML = "";
            const data = (mode === "TOOLS") ? groupedTools : groupedChems;
            Object.keys(data).forEach((nhom, i) => {
                const btn = document.createElement('button');
                btn.className = 's4-cat-btn' + (i===0 ? ' active-cat' : '');
                btn.innerText = nhom;
                btn.onclick = () => {
                    document.querySelectorAll('.s4-cat-btn').forEach(b => b.classList.remove('active-cat'));
                    btn.classList.add('active-cat');
                    renderGrid(nhom);
                };
                sb.appendChild(btn);
            });
            renderGrid(Object.keys(data)[0]);
        }

        function renderGrid(nhom) {
            const grid = document.getElementById('s4-icon-grid');
            grid.innerHTML = "";
            const items = (currentMode === "TOOLS") ? groupedTools[nhom] : groupedChems[nhom];
            items.forEach(t => {
                const d = document.createElement('div');
                d.className = 's4-unit';
                d.onclick = () => {
                    const req = (currentMode === "TOOLS" ? currentExp.tools : currentExp.chems).split(',').map(s=>s.trim());
                    if (!req.includes(t.n)) return speak("Món này không cần cho thí nghiệm hiện tại.", null, 'dr-avatar-s4');
                    if (selectedItems.includes(t.n)) return;
                    selectedItems.push(t.n);
                    const tray = document.getElementById('s4-tray');
                    const itm = document.createElement('div');
                    itm.className = 'tray-item';
                    itm.innerHTML = `<img src="${iconPath}${t.f}" style="width:100%;height:100%;object-fit:contain;">`;
                    tray.appendChild(itm);
                };
                d.innerHTML = `<img src="${iconPath}${t.f}" class="s4-img"><span style="font-size:0.7rem;font-weight:bold;">${t.n}</span>`;
                grid.appendChild(d);
            });
        }

        function validateCurrentMode() {
            const req = (currentMode === "TOOLS" ? currentExp.tools : currentExp.chems).split(',').map(s=>s.trim());
            const missing = req.filter(x => !selectedItems.includes(x));
            if (missing.length > 0) return speak("Bạn còn thiếu: " + missing.join(", "), null, 'dr-avatar-s4');

            if (currentMode === "TOOLS") {
                finalSelection.tools = [...selectedItems];
                selectedItems = [];
                document.getElementById('s4-tray').innerHTML = "";
                document.getElementById('main-check-btn').innerText = "XONG HÓA CHẤT";
                setupSidebar("CHEMICALS");
                speak("Chính xác! Giờ hãy chọn tiếp hóa chất.");
            } else {
                finalSelection.chems = [...selectedItems];
                speak("Chuẩn bị xong! Chào mừng bạn đến với bàn thực hành.", () => goToStep5(), 'dr-avatar-s4');
            }
        }

        function goToStep5() {
            showScreen('step5');
            const area = document.getElementById('workbench-area');
            area.innerHTML = "";
            const isMobile = window.innerWidth < 768;
            
            finalSelection.tools.forEach((n, i) => {
                const x = isMobile ? (20 + i*100) : (100 + i*180);
                area.appendChild(createDraggableItem(n, x, isMobile ? 350 : 450, "glassware"));
            });
            finalSelection.chems.forEach((n, i) => {
                const x = isMobile ? (30 + i*110) : (150 + i*200);
                area.appendChild(createDraggableItem(n, x, isMobile ? 180 : 280, "reagent"));
            });
            setupDragging();
        }

        function createDraggableItem(name, x, y, type) {
            const div = document.createElement('div');
            div.className = 'draggable-item';
            div.style.left = x + "px"; div.style.top = y + "px";
            if (type === "reagent") {
                let img = "Quytim.jpg";
                const lines = chemicalDataRaw.trim().split('\n');
                for(let l of lines) { const p = l.split('|').map(s=>s.trim()); if(p[1] === name) { img = p[2]; break; } }
                div.innerHTML = `<div class="reagent-bottle"><img src="assets/chemicals/${img}" class="real-tool-img" alt="${name}"></div>`;
            } else {
                div.innerHTML = Glassware.render(name, "id-" + Math.random());
                if(typeof LabActions !== 'undefined') LabActions.renderExtra(div, name);
                div.ondblclick = () => LabActions.execute(div, name);
            }
            return div;
        }

        function setupDragging() {
            let active = null, offset = {x:0, y:0};
            const area = document.getElementById('workbench-area');
            const start = (e) => {
                const target = e.target.closest('.draggable-item');
                if (!target) return;
                active = target;
                const touch = e.touches ? e.touches[0] : e;
                offset.x = touch.clientX - active.offsetLeft;
                offset.y = touch.clientY - active.offsetTop;
                active.style.zIndex = 1000;
            };
            const move = (e) => {
                if (!active) return;
                const touch = e.touches ? e.touches[0] : e;
                active.style.left = (touch.clientX - offset.x) + "px";
                active.style.top = (touch.clientY - offset.y) + "px";
            };
            const end = () => {
                if (active) {
                    active.style.zIndex = 500;
                    LabActions.checkAllGlobalReactions();
                    active = null;
                }
            };
            area.addEventListener('mousedown', start);
            area.addEventListener('touchstart', start, {passive:false});
            document.addEventListener('mousemove', move);
            document.addEventListener('touchmove', move, {passive:false});
            document.addEventListener('mouseup', end);
            document.addEventListener('touchend', end);
        }

        function showScreen(id) { document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active')); document.getElementById(id).classList.add('active'); }
        function backToStep2() { location.reload(); }

        window.onload = initApp;
    </script>
</body>
</html>
